<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  @keyframes pulse-node{0%,100%{opacity:0.3}50%{opacity:0.9}}
  @keyframes glow{0%,100%{opacity:0.03}50%{opacity:0.12}}
  @keyframes scanline{0%{transform:translateY(0)}100%{transform:translateY(160px)}}
  .bg{fill:#1a1008}
  .conn{stroke:#3D2800;stroke-width:0.6;fill:none}
  .node-outer{fill:#7A5200;opacity:0.5}
  .node-inner{fill:#FFB800;opacity:0.7}
  .scan{fill:#FFB800;opacity:0.03;animation:scanline 3s linear infinite}
  .label{font-family:monospace;font-size:7px;fill:#7A5200;opacity:0.4}
  .np1{animation:pulse-node 2.5s ease-in-out infinite}
  .np2{animation:pulse-node 2.5s ease-in-out 0.4s infinite}
  .np3{animation:pulse-node 2.5s ease-in-out 0.8s infinite}
  .np4{animation:pulse-node 2.5s ease-in-out 1.2s infinite}
  .np5{animation:pulse-node 2.5s ease-in-out 1.6s infinite}
  .np6{animation:pulse-node 2.5s ease-in-out 2.0s infinite}
  .glow-bg{animation:glow 4s ease-in-out infinite}
</style>
</defs>

<rect class="bg" width="480" height="160"/>
<rect class="scan" x="0" y="0" width="480" height="2"/>
<ellipse class="glow-bg" cx="240" cy="80" rx="190" ry="65" fill="#FFB800"/>

<!-- CONNECTIONS -->
<g class="conn">
<line x1="60" y1="35" x2="150" y2="22"/><line x1="60" y1="35" x2="150" y2="52"/><line x1="60" y1="35" x2="150" y2="82"/>
<line x1="60" y1="60" x2="150" y2="22"/><line x1="60" y1="60" x2="150" y2="52"/><line x1="60" y1="60" x2="150" y2="82"/><line x1="60" y1="60" x2="150" y2="112"/>
<line x1="60" y1="85" x2="150" y2="52"/><line x1="60" y1="85" x2="150" y2="82"/><line x1="60" y1="85" x2="150" y2="112"/><line x1="60" y1="85" x2="150" y2="142"/>
<line x1="60" y1="110" x2="150" y2="82"/><line x1="60" y1="110" x2="150" y2="112"/><line x1="60" y1="110" x2="150" y2="142"/>
<line x1="60" y1="135" x2="150" y2="112"/><line x1="60" y1="135" x2="150" y2="142"/>
<line x1="150" y1="22" x2="240" y2="30"/><line x1="150" y1="22" x2="240" y2="55"/>
<line x1="150" y1="52" x2="240" y2="30"/><line x1="150" y1="52" x2="240" y2="55"/><line x1="150" y1="52" x2="240" y2="80"/>
<line x1="150" y1="82" x2="240" y2="55"/><line x1="150" y1="82" x2="240" y2="80"/><line x1="150" y1="82" x2="240" y2="105"/>
<line x1="150" y1="112" x2="240" y2="80"/><line x1="150" y1="112" x2="240" y2="105"/><line x1="150" y1="112" x2="240" y2="130"/>
<line x1="150" y1="142" x2="240" y2="105"/><line x1="150" y1="142" x2="240" y2="130"/>
<line x1="240" y1="30" x2="330" y2="35"/><line x1="240" y1="30" x2="330" y2="60"/>
<line x1="240" y1="55" x2="330" y2="35"/><line x1="240" y1="55" x2="330" y2="60"/><line x1="240" y1="55" x2="330" y2="85"/>
<line x1="240" y1="80" x2="330" y2="60"/><line x1="240" y1="80" x2="330" y2="85"/><line x1="240" y1="80" x2="330" y2="110"/>
<line x1="240" y1="105" x2="330" y2="85"/><line x1="240" y1="105" x2="330" y2="110"/>
<line x1="240" y1="130" x2="330" y2="110"/><line x1="240" y1="130" x2="330" y2="135"/>
<line x1="330" y1="35" x2="420" y2="55"/><line x1="330" y1="60" x2="420" y2="55"/><line x1="330" y1="60" x2="420" y2="80"/>
<line x1="330" y1="85" x2="420" y2="55"/><line x1="330" y1="85" x2="420" y2="80"/><line x1="330" y1="85" x2="420" y2="105"/>
<line x1="330" y1="110" x2="420" y2="80"/><line x1="330" y1="110" x2="420" y2="105"/>
<line x1="330" y1="135" x2="420" y2="105"/>
</g>

<!-- SIGNALS - each uses SMIL animate to move cx/cy through node positions -->
<!-- Sig1 -->
<circle r="3" fill="#FFD866">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="3s" repeatCount="indefinite"/>
<animate attributeName="cy" values="35;52;80;85;80;80" dur="3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.9;0.9;0.9;0.9;0" dur="3s" repeatCount="indefinite"/>
</circle>
<circle r="6" fill="#FFD866">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="3s" repeatCount="indefinite"/>
<animate attributeName="cy" values="35;52;80;85;80;80" dur="3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.15;0.15;0.15;0.15;0" dur="3s" repeatCount="indefinite"/>
</circle>

<!-- Sig2 -->
<circle r="3" fill="#FFB800">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
<animate attributeName="cy" values="85;112;105;110;105;105" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.9;0.9;0.9;0.9;0" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
</circle>
<circle r="6" fill="#FFB800">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
<animate attributeName="cy" values="85;112;105;110;105;105" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.12;0.12;0.12;0.12;0" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
</circle>

<!-- Sig3 -->
<circle r="2.5" fill="#FF8C00">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="3.2s" begin="1s" repeatCount="indefinite"/>
<animate attributeName="cy" values="60;22;30;35;55;55" dur="3.2s" begin="1s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.85;0.85;0.85;0.85;0" dur="3.2s" begin="1s" repeatCount="indefinite"/>
</circle>
<circle r="5" fill="#FF8C00">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="3.2s" begin="1s" repeatCount="indefinite"/>
<animate attributeName="cy" values="60;22;30;35;55;55" dur="3.2s" begin="1s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.12;0.12;0.12;0.12;0" dur="3.2s" begin="1s" repeatCount="indefinite"/>
</circle>

<!-- Sig4 -->
<circle r="2.5" fill="#FFAA00">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="2.6s" begin="1.5s" repeatCount="indefinite"/>
<animate attributeName="cy" values="110;142;130;135;105;105" dur="2.6s" begin="1.5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.85;0.85;0.85;0.85;0" dur="2.6s" begin="1.5s" repeatCount="indefinite"/>
</circle>

<!-- Sig5 -->
<circle r="3" fill="#FFD866">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="3.4s" begin="0.8s" repeatCount="indefinite"/>
<animate attributeName="cy" values="135;112;80;60;55;55" dur="3.4s" begin="0.8s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.8;0.8;0.8;0.8;0" dur="3.4s" begin="0.8s" repeatCount="indefinite"/>
</circle>

<!-- Sig6 -->
<circle r="2.5" fill="#FFB800">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="2.9s" begin="2s" repeatCount="indefinite"/>
<animate attributeName="cy" values="60;82;55;60;80;80" dur="2.9s" begin="2s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.85;0.85;0.85;0.85;0" dur="2.9s" begin="2s" repeatCount="indefinite"/>
</circle>

<!-- Sig7 -->
<circle r="2.5" fill="#FF8C00">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="3.1s" begin="1.3s" repeatCount="indefinite"/>
<animate attributeName="cy" values="85;52;55;85;105;105" dur="3.1s" begin="1.3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.8;0.8;0.8;0.8;0" dur="3.1s" begin="1.3s" repeatCount="indefinite"/>
</circle>

<!-- Sig8 -->
<circle r="3" fill="#FFAA00">
<animate attributeName="cx" values="60;150;240;330;420;420" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
<animate attributeName="cy" values="35;82;105;110;80;80" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.85;0.85;0.85;0.85;0" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
</circle>

<!-- NODES (drawn on top of signals) -->
<circle class="node-outer np1" cx="60" cy="35" r="5"/><circle class="node-inner np1" cx="60" cy="35" r="2"/>
<circle class="node-outer np2" cx="60" cy="60" r="5"/><circle class="node-inner np2" cx="60" cy="60" r="2"/>
<circle class="node-outer np3" cx="60" cy="85" r="5"/><circle class="node-inner np3" cx="60" cy="85" r="2"/>
<circle class="node-outer np4" cx="60" cy="110" r="5"/><circle class="node-inner np4" cx="60" cy="110" r="2"/>
<circle class="node-outer np5" cx="60" cy="135" r="5"/><circle class="node-inner np5" cx="60" cy="135" r="2"/>

<circle class="node-outer np3" cx="150" cy="22" r="4.5"/><circle class="node-inner np3" cx="150" cy="22" r="1.8"/>
<circle class="node-outer np5" cx="150" cy="52" r="4.5"/><circle class="node-inner np5" cx="150" cy="52" r="1.8"/>
<circle class="node-outer np1" cx="150" cy="82" r="4.5"/><circle class="node-inner np1" cx="150" cy="82" r="1.8"/>
<circle class="node-outer np4" cx="150" cy="112" r="4.5"/><circle class="node-inner np4" cx="150" cy="112" r="1.8"/>
<circle class="node-outer np6" cx="150" cy="142" r="4.5"/><circle class="node-inner np6" cx="150" cy="142" r="1.8"/>

<circle class="node-outer np2" cx="240" cy="30" r="4.5"/><circle class="node-inner np2" cx="240" cy="30" r="1.8"/>
<circle class="node-outer np6" cx="240" cy="55" r="4.5"/><circle class="node-inner np6" cx="240" cy="55" r="1.8"/>
<circle class="node-outer np4" cx="240" cy="80" r="4.5"/><circle class="node-inner np4" cx="240" cy="80" r="1.8"/>
<circle class="node-outer np1" cx="240" cy="105" r="4.5"/><circle class="node-inner np1" cx="240" cy="105" r="1.8"/>
<circle class="node-outer np3" cx="240" cy="130" r="4.5"/><circle class="node-inner np3" cx="240" cy="130" r="1.8"/>

<circle class="node-outer np5" cx="330" cy="35" r="4.5"/><circle class="node-inner np5" cx="330" cy="35" r="1.8"/>
<circle class="node-outer np2" cx="330" cy="60" r="4.5"/><circle class="node-inner np2" cx="330" cy="60" r="1.8"/>
<circle class="node-outer np6" cx="330" cy="85" r="4.5"/><circle class="node-inner np6" cx="330" cy="85" r="1.8"/>
<circle class="node-outer np3" cx="330" cy="110" r="4.5"/><circle class="node-inner np3" cx="330" cy="110" r="1.8"/>
<circle class="node-outer np1" cx="330" cy="135" r="4.5"/><circle class="node-inner np1" cx="330" cy="135" r="1.8"/>

<circle class="node-outer np4" cx="420" cy="55" r="5.5"/><circle class="node-inner np4" cx="420" cy="55" r="2.2"/>
<circle class="node-outer np6" cx="420" cy="80" r="5.5"/><circle class="node-inner np6" cx="420" cy="80" r="2.2"/>
<circle class="node-outer np2" cx="420" cy="105" r="5.5"/><circle class="node-inner np2" cx="420" cy="105" r="2.2"/>

<text class="label" x="44" y="155">INPUT</text>
<text class="label" x="222" y="155">HIDDEN</text>
<text class="label" x="404" y="128">OUT</text>
</svg>
