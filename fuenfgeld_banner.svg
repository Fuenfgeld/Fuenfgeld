<animate attributeName="opacity" values="0;0.85;0.85;0.85;0.85;0.85;0" dur="3s" begin="1.8s" repeatCount="indefinite"/>
</circle>

<circle r="3" fill="#FF9F1C">
<animate attributeName="cx" values="0;120;240;360;480;600;600" dur="3.6s" begin="0.3s" repeatCount="indefinite"/>
<animate attributeName="cy" values="50;70;80;80;70;55;55" dur="3.6s" begin="0.3s" repeatCount="indefinite"/>
