<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  @keyframes pulse-node{0%,100%{opacity:0.3}50%{opacity:0.9}}
  @keyframes ekg-scroll{0%{transform:translateX(0)}100%{transform:translateX(-400px)}}

  /* === NAME GLITCH === */
  @keyframes glitch-main{
    0%,87%,100%{transform:translate(0,0)}
    88%{transform:translate(-3px,0)}89%{transform:translate(3px,0)}
    90%{transform:translate(-2px,1px)}91%{transform:translate(0,0)}
    95%{transform:translate(2px,0)}96%{transform:translate(-1px,-1px)}97%{transform:translate(0,0)}
  }
  @keyframes glitch-r{
    0%,87%,100%{transform:translate(0,0);opacity:0}
    88%{transform:translate(3px,1px);opacity:0.7}89%{transform:translate(-2px,0);opacity:0}
    90%{transform:translate(4px,-1px);opacity:0.6}91%{transform:translate(0,0);opacity:0}
    95%{transform:translate(3px,0);opacity:0.5}96%{transform:translate(-3px,1px);opacity:0.6}97%{transform:translate(0,0);opacity:0}
  }
  @keyframes glitch-b{
    0%,87%,100%{transform:translate(0,0);opacity:0}
    88%{transform:translate(-3px,-1px);opacity:0.6}89%{transform:translate(2px,1px);opacity:0}
    90%{transform:translate(-4px,1px);opacity:0.5}91%{transform:translate(0,0);opacity:0}
    95%{transform:translate(-2px,0);opacity:0.4}96%{transform:translate(3px,-1px);opacity:0.5}97%{transform:translate(0,0);opacity:0}
  }
  @keyframes glitch-slice1{
    0%,84%,92%,100%{transform:translate(0,0);clip-path:inset(0 0 100% 0)}
    85%{transform:translate(8px,0);clip-path:inset(30% 0 55% 0)}
    86%{transform:translate(-5px,0);clip-path:inset(25% 0 60% 0)}
    87%{transform:translate(12px,0);clip-path:inset(35% 0 50% 0)}
    88%{transform:translate(0,0);clip-path:inset(0 0 100% 0)}
  }
  @keyframes glitch-slice2{
    0%,90%,98%,100%{transform:translate(0,0);clip-path:inset(0 0 100% 0)}
    91%{transform:translate(-10px,0);clip-path:inset(60% 0 20% 0)}
    92%{transform:translate(6px,0);clip-path:inset(55% 0 25% 0)}
    93%{transform:translate(-8px,0);clip-path:inset(65% 0 18% 0)}
    94%{transform:translate(0,0);clip-path:inset(0 0 100% 0)}
  }
  @keyframes glitch-slice3{
    0%,80%,86%,100%{transform:translate(0,0);clip-path:inset(0 0 100% 0)}
    81%{transform:translate(6px,0);clip-path:inset(10% 0 78% 0)}
    82%{transform:translate(-8px,0);clip-path:inset(5% 0 82% 0)}
    83%{transform:translate(4px,0);clip-path:inset(8% 0 80% 0)}
    84%{transform:translate(0,0);clip-path:inset(0 0 100% 0)}
  }
  @keyframes flicker{
    0%,100%{opacity:1}
    88%{opacity:1}88.5%{opacity:0.4}89%{opacity:1}89.5%{opacity:0.6}90%{opacity:1}
    95%{opacity:1}95.5%{opacity:0.5}96%{opacity:1}
  }
  @keyframes scanline-g{
    0%,100%{opacity:0}88%{opacity:0}89%{opacity:0.15}90%{opacity:0.2}91%{opacity:0}
  }

  /* === NAME LETTER SWAP === */
  @keyframes swap-name{
    0%,82%,88%,100%{opacity:0}
    83%{opacity:1}84%{opacity:0.9}85%{opacity:1}86%{opacity:0.8}87%{opacity:0}
  }

  /* === SUBTITLE GLITCH === */
  @keyframes sub-glitch{
    0%,90%,100%{transform:translate(0,0)}
    91%{transform:translate(5px,0)}92%{transform:translate(-4px,0)}
    93%{transform:translate(3px,1px)}94%{transform:translate(0,0)}
  }
  @keyframes sub-flicker{
    0%,100%{opacity:0.7}
    91%{opacity:0.7}91.5%{opacity:0.2}92%{opacity:0.8}92.5%{opacity:0.3}93%{opacity:0.7}
  }
  @keyframes sub-r{
    0%,90%,100%{transform:translate(0,0);opacity:0}
    91%{transform:translate(3px,0);opacity:0.5}92%{transform:translate(-2px,1px);opacity:0.4}
    93%{transform:translate(0,0);opacity:0}
  }
  @keyframes sub-b{
    0%,90%,100%{transform:translate(0,0);opacity:0}
    91%{transform:translate(-3px,0);opacity:0.4}92%{transform:translate(2px,-1px);opacity:0.3}
    93%{transform:translate(0,0);opacity:0}
  }
  @keyframes sub-slice{
    0%,88%,94%,100%{transform:translate(0,0);clip-path:inset(0 0 100% 0)}
    89%{transform:translate(6px,0);clip-path:inset(20% 0 40% 0)}
    90%{transform:translate(-8px,0);clip-path:inset(10% 0 50% 0)}
    91%{transform:translate(4px,0);clip-path:inset(30% 0 30% 0)}
    92%{transform:translate(0,0);clip-path:inset(0 0 100% 0)}
  }

  /* === SUBTITLE LETTER SWAP === */
  @keyframes swap-sub{
    0%,72%,78%,100%{opacity:0}
    73%{opacity:0.7}74%{opacity:0.6}75%{opacity:0.7}76%{opacity:0.5}77%{opacity:0}
  }
  @keyframes swap-sub2{
    0%,55%,61%,100%{opacity:0}
    56%{opacity:0.7}57%{opacity:0.5}58%{opacity:0.7}59%{opacity:0.6}60%{opacity:0}
  }

  .bg{fill:#1a0a2e}
  .name{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:72px;font-weight:800;fill:#FF6EC7;letter-spacing:6px}
  .name-main{animation:glitch-main 4s linear infinite,flicker 4s linear infinite}
  .name-r{fill:#FF9F1C;animation:glitch-r 4s linear infinite}
  .name-b{fill:#FFD700;animation:glitch-b 4s linear infinite}
  .name-s1{fill:#FF6EC7;animation:glitch-slice1 3s linear infinite}
  .name-s2{fill:#FF9F1C;animation:glitch-slice2 3.5s linear infinite}
  .name-s3{fill:#FF6EC7;animation:glitch-slice3 4.5s linear infinite}
  .scan-g{animation:scanline-g 4s linear infinite}

  .sub{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:400;letter-spacing:8px;fill:#FFD700}
  .sub-main{animation:sub-glitch 5s linear infinite,sub-flicker 5s linear infinite}
  .sub-r{fill:#FF9F1C;animation:sub-r 5s linear infinite}
  .sub-b{fill:#FF6EC7;animation:sub-b 5s linear infinite}
  .sub-sl{fill:#FFD700;animation:sub-slice 4s linear infinite}

  /* Swap text styling */
  .swap-name{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:72px;font-weight:800;fill:#FF9F1C;letter-spacing:6px;opacity:0;animation:swap-name 6s linear infinite}
  .swap-sub{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:400;letter-spacing:8px;fill:#FF6EC7;opacity:0}
  .ss1{animation:swap-sub 7s linear infinite}
  .ss2{animation:swap-sub2 8s linear infinite}

  .conn{stroke:#3a1a5a;stroke-width:0.5;fill:none}
  .no{fill:#3a1a5a;opacity:0.5}
  .ni{fill:#FF6EC7;opacity:0.7}
  .np1{animation:pulse-node 2.5s ease-in-out infinite}
  .np2{animation:pulse-node 2.5s ease-in-out 0.5s infinite}
  .np3{animation:pulse-node 2.5s ease-in-out 1s infinite}
  .np4{animation:pulse-node 2.5s ease-in-out 1.5s infinite}
  .np5{animation:pulse-node 2.5s ease-in-out 2s infinite}
  .ekg-g{animation:ekg-scroll 4s linear infinite}
</style>
</defs>

<rect class="bg" width="800" height="300"/>

<!-- ============ EKG ============ -->
<g clip-path="url(#ekg-full)">
<clipPath id="ekg-full"><rect x="0" y="40" width="800" height="90"/></clipPath>
<g class="ekg-g">
<polyline points="0,85 50,85 60,80 62,85 64,70 66,98 68,80 75,85 130,85 140,80 142,85 144,70 146,98 148,80 155,85 210,85 220,80 222,85 224,70 226,98 228,80 235,85 290,85 300,80 302,85 304,70 306,98 308,80 315,85 370,85 380,80 382,85 384,70 386,98 388,80 395,85 450,85 460,80 462,85 464,70 466,98 468,80 475,85 530,85 540,80 542,85 544,70 546,98 548,80 555,85 610,85 620,80 622,85 624,70 626,98 628,80 635,85 690,85 700,80 702,85 704,70 706,98 708,80 715,85 770,85 780,80 782,85 784,70 786,98 788,80 795,85 850,85 860,80 862,85 864,70 866,98 868,80 875,85 930,85 940,80 942,85 944,70 946,98 948,80 955,85 1010,85 1020,80 1022,85 1024,70 1026,98 1028,80 1035,85 1090,85 1100,80 1102,85 1104,70 1106,98 1108,80 1115,85 1200,85" fill="none" stroke="#FF9F1C" stroke-width="1.5" opacity="0.25"/>
</g>
<g class="ekg-g" style="animation-delay:-1.5s">
<polyline points="0,85 50,85 60,80 62,85 64,70 66,98 68,80 75,85 130,85 140,80 142,85 144,70 146,98 148,80 155,85 210,85 220,80 222,85 224,70 226,98 228,80 235,85 290,85 300,80 302,85 304,70 306,98 308,80 315,85 370,85 380,80 382,85 384,70 386,98 388,80 395,85 450,85 460,80 462,85 464,70 466,98 468,80 475,85 530,85 540,80 542,85 544,70 546,98 548,80 555,85 610,85 620,80 622,85 624,70 626,98 628,80 635,85 690,85 700,80 702,85 704,70 706,98 708,80 715,85 770,85 780,80 782,85 784,70 786,98 788,80 795,85 850,85 860,80 862,85 864,70 866,98 868,80 875,85 930,85 940,80 942,85 944,70 946,98 948,80 955,85 1010,85 1020,80 1022,85 1024,70 1026,98 1028,80 1035,85 1090,85 1100,80 1102,85 1104,70 1106,98 1108,80 1115,85 1200,85" fill="none" stroke="#FF6EC7" stroke-width="1" opacity="0.12"/>
</g>
</g>

<!-- ============ GLITCHY NAME ============ -->
<!-- RGB split -->
<text class="name name-r" text-anchor="middle" x="400" y="95">FUENFGELD</text>
<text class="name name-b" text-anchor="middle" x="400" y="95">FUENFGELD</text>
<!-- Slices -->
<text class="name name-s1" text-anchor="middle" x="400" y="95">FUENFGELD</text>
<text class="name name-s2" text-anchor="middle" x="400" y="95">FUENFGELD</text>
<text class="name name-s3" text-anchor="middle" x="400" y="95">FUENFGELD</text>
<!-- Letter-swap: corrupted name flashes briefly -->
<text class="swap-name" text-anchor="middle" x="400" y="95">FU3NFG€LD</text>
<text class="swap-name" text-anchor="middle" x="400" y="95" style="animation-delay:2.5s">FUƏNFG∃LD</text>
<text class="swap-name" text-anchor="middle" x="400" y="95" style="animation-delay:4.2s">FÜ£NFGΞLD</text>
<!-- Main name -->
<text class="name name-main" text-anchor="middle" x="400" y="95">FUENFGELD</text>
<!-- Scanlines -->
<rect class="scan-g" x="0" y="70" width="800" height="3" fill="#FF6EC7"/>
<rect class="scan-g" x="0" y="88" width="800" height="2" fill="#FF9F1C" style="animation-delay:0.5s"/>

<!-- ============ GLITCHY SUBTITLE ============ -->
<!-- RGB split -->
<text class="sub sub-r" text-anchor="middle" x="400" y="125">HEALTH INFORMATICS</text>
<text class="sub sub-b" text-anchor="middle" x="400" y="125">HEALTH INFORMATICS</text>
<!-- Slice -->
<text class="sub sub-sl" text-anchor="middle" x="400" y="125">HEALTH INFORMATICS</text>
<!-- Letter-swap: corrupted subtitle flashes -->
<text class="swap-sub ss1" text-anchor="middle" x="400" y="125">H€ALTH 1NF0RMAT1CS</text>
<text class="swap-sub ss2" text-anchor="middle" x="400" y="125">HΞALTH INFΘRMΔTICS</text>
<text class="swap-sub ss1" text-anchor="middle" x="400" y="125" style="animation-delay:3s">H3@LTH !NF0RM@T!C5</text>
<text class="swap-sub ss2" text-anchor="middle" x="400" y="125" style="animation-delay:5s">HËΛLTH ÏNFΦRMÄTÎCS</text>
<!-- Main subtitle -->
<text class="sub sub-main" text-anchor="middle" x="400" y="125">HEALTH INFORMATICS</text>

<!-- ============ NEURAL NETWORK ============ -->
<g transform="translate(100,150)">

<g class="conn">
<line x1="0" y1="20" x2="120" y2="10"/><line x1="0" y1="20" x2="120" y2="40"/><line x1="0" y1="20" x2="120" y2="70"/>
<line x1="0" y1="50" x2="120" y2="10"/><line x1="0" y1="50" x2="120" y2="40"/><line x1="0" y1="50" x2="120" y2="70"/><line x1="0" y1="50" x2="120" y2="100"/>
<line x1="0" y1="80" x2="120" y2="40"/><line x1="0" y1="80" x2="120" y2="70"/><line x1="0" y1="80" x2="120" y2="100"/><line x1="0" y1="80" x2="120" y2="130"/>
<line x1="0" y1="110" x2="120" y2="70"/><line x1="0" y1="110" x2="120" y2="100"/><line x1="0" y1="110" x2="120" y2="130"/>
<line x1="120" y1="10" x2="240" y2="20"/><line x1="120" y1="10" x2="240" y2="50"/>
<line x1="120" y1="40" x2="240" y2="20"/><line x1="120" y1="40" x2="240" y2="50"/><line x1="120" y1="40" x2="240" y2="80"/>
<line x1="120" y1="70" x2="240" y2="50"/><line x1="120" y1="70" x2="240" y2="80"/><line x1="120" y1="70" x2="240" y2="110"/>
