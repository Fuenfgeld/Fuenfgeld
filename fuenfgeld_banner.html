.letter{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:96px;font-weight:800;fill:url(#text-shimmer);opacity:0;animation:letter-in 0.25s cubic-bezier(0.22,1,0.36,1) forwards}

.name-stroke{fill:none;stroke-width:3px;stroke-dasharray:7% 28%;stroke-dashoffset:0%;animation:stroke-loop 5.5s infinite linear;opacity:0;transition:opacity 0.4s}
.name-stroke.visible{opacity:1}
.name-stroke:nth-child(1){stroke:#0077B6;animation-delay:0s}
.name-stroke:nth-child(2){stroke:#00A3E0;animation-delay:-1.1s}
.name-stroke:nth-child(3){stroke:#48CAE4;animation-delay:-2.2s}
.name-stroke:nth-child(4){stroke:#90E0EF;animation-delay:-3.3s}

.ecg-line{fill:none;stroke:#00A3E0;stroke-width:1.5;opacity:0.12}
.ecg-line2{fill:none;stroke:#0077B6;stroke-width:1;opacity:0.06}
.pulse-sweep{animation:pulse-move 4s linear infinite}
.term-text{font-family:'Courier New',monospace;font-size:10px;fill:#48CAE4;opacity:0.5}
.term-cursor{animation:cursor-blink 1s step-end infinite}

<canvas id="dna-canvas" width="320" height="640" style="position:absolute;right:5px;top:0;width:120px;height:100%;z-index:2"></canvas>

<script>
(function(){
var lines=[
  '$ python analyze_ehr.py',
  'Loading FHIR resources...',
  'Patients: 12,847',
  'Observations: 384,291',
  'Conditions: 67,403',
  '$ grep -c "ICD-10" dx.csv',
  '24,891',
  '$ ml-pipeline --train',
  'Epoch 1/50  loss: 0.847',
  'Epoch 10/50 loss: 0.312',
  'Epoch 25/50 loss: 0.089',
  'Epoch 50/50 loss: 0.024',
  'AUC: 0.964  F1: 0.91',
  '$ ssh clinic-node-03',
  'Connected to HL7 stream',
  'ADT^A01 messages: 1,204',
  '$ cat /proc/uptime',
  '8742103.47 34291840.12',
  '$ docker ps | head -5',
  'fhir-server    Up 47d',
  'redis-cache    Up 47d',
  'nlp-service    Up 12d',
  '$ query-snomed "diabetes"',
  'Found 73 matching concepts',
  '$ tail -f /var/log/hl7.log',
];
var ns='http://www.w3.org/2000/svg';
var container=document.getElementById('term-lines');
var cursor=document.getElementById('term-cursor-rect');
var lineIdx=0,charIdx=0,currentY=44,lineH=13,maxLines=18;
var displayed=[];
var typingSpeed=40;
var lineDelay=600;

function addChar(){
  if(lineIdx>=lines.length)lineIdx=0;
  var line=lines[lineIdx];
  if(charIdx===0){
    var txt=document.createElementNS(ns,'text');
    txt.setAttribute('class','term-text');
    txt.setAttribute('x','28');
    txt.setAttribute('y',String(currentY));
    if(line.startsWith('$'))txt.setAttribute('fill','#00A3E0');
    container.appendChild(txt);
    displayed.push(txt);
    if(displayed.length>maxLines){
      var old=displayed.shift();
      old.remove();
      displayed.forEach(function(t){
        var cy=parseFloat(t.getAttribute('y'));
        t.setAttribute('y',String(cy-lineH));
      });
      currentY-=lineH;
    }
  }
  var current=displayed[displayed.length-1];
  charIdx++;
  current.textContent=line.substring(0,charIdx);
  cursor.setAttribute('x',String(28+charIdx*5.5));
  cursor.setAttribute('y',String(currentY-9));
  if(charIdx>=line.length){
    charIdx=0;
    lineIdx++;
    currentY+=lineH;
    cursor.setAttribute('x','28');
    cursor.setAttribute('y',String(currentY-9));
    setTimeout(addChar,lineDelay);
  } else {
    setTimeout(addChar,typingSpeed);
  }
}
setTimeout(addChar,800);

var c=document.getElementById('dna-canvas');
if(!c)return;
var ctx=c.getContext('2d');
var W=160,H=320;
c.width=W*2;c.height=H*2;
ctx.scale(2,2);
var cols=['#0077B6','#00A3E0','#48CAE4','#90E0EF'];
var offset=0,cx=W/2,radius=30,rungs=20,speed=0.012;

function draw(){
  ctx.clearRect(0,0,W,H);
  offset+=speed;
  var pts=[];
  for(var i=0;i<rungs;i++){
    var t=i/rungs;
    var y=t*H;
    var angle=t*Math.PI*4+offset;
    var x1=cx+Math.sin(angle)*radius;
    var x2=cx+Math.sin(angle+Math.PI)*radius;
    var z1=Math.cos(angle);
    var z2=Math.cos(angle+Math.PI);
    pts.push({y:y,x1:x1,x2:x2,z1:z1,z2:z2,i:i});
  }
  for(var i=0;i<pts.length;i++){
    var p=pts[i];
    var op=0.15+Math.abs(p.z1)*0.15;
    ctx.beginPath();ctx.moveTo(p.x1,p.y);ctx.lineTo(p.x2,p.y);
    ctx.strokeStyle='rgba(0,163,224,'+op+')';ctx.lineWidth=1.2;ctx.stroke();
  }
  var steps=200;
  function drawStrand(phaseOff,col){
    for(var i=1;i<=steps;i++){
      var t=i/steps,tp=(i-1)/steps;
      var y=t*H,yp=tp*H;
      var a=t*Math.PI*4+offset+phaseOff,ap=tp*Math.PI*4+offset+phaseOff;
      var x=cx+Math.sin(a)*radius,xp=cx+Math.sin(ap)*radius;
      var z=Math.cos(a);
      var op=0.2+(z+1)*0.25;
      var lw=0.8+(z+1)*0.8;
      ctx.beginPath();ctx.moveTo(xp,yp);ctx.lineTo(x,y);
      ctx.strokeStyle=col.replace('XXX',op);ctx.lineWidth=lw;ctx.stroke();
    }
  }
  drawStrand(0,'rgba(0,119,182,XXX)');
  drawStrand(Math.PI,'rgba(72,202,228,XXX)');
  for(var i=0;i<pts.length;i++){
    var p=pts[i];
    var r1=2+(p.z1+1)*1.5,r2=2+(p.z2+1)*1.5;
    var op1=0.3+(p.z1+1)*0.25,op2=0.3+(p.z2+1)*0.25;
    ctx.beginPath();ctx.arc(p.x1,p.y,r1,0,Math.PI*2);
    ctx.fillStyle=cols[p.i%4];ctx.globalAlpha=op1;ctx.fill();ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(p.x2,p.y,r2,0,Math.PI*2);
    ctx.fillStyle=cols[(p.i+2)%4];ctx.globalAlpha=op2;ctx.fill();ctx.globalAlpha=1;
  }
  requestAnimationFrame(draw);
}
draw();
})();
</script>
